name = "physio-r2-reports"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[[r2_buckets]]
binding = "REPORTS_BUCKET"
bucket_name = "physio-reports"

[vars]
# Comma-separated site origins (scheme + host only for GitHub Pages project sites).
# Browser Origin is e.g. https://your-user.github.io — not the repo path.
# You can also paste full Pages URLs; paths are stripped automatically.
ALLOWED_ORIGINS = "http://localhost:5173,https://jagdeep1001.github.io"
